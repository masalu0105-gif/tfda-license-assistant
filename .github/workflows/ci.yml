name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check scripts/ tests/

      - name: Run tests
        run: pytest tests/ --cov=scripts --cov-report=term-missing -v --tb=short

      - name: Enforce per-module coverage thresholds (core modules)
        run: |
          coverage report --include='scripts/tfda_normalize.py' --fail-under=90
          coverage report --include='scripts/tfda_search.py' --fail-under=85
          coverage report --include='scripts/tfda_formatter.py' --fail-under=80

      - name: Verify SKILL.md ↔ CLI flags consistency
        run: pytest tests/test_skill_md_consistency.py -v
        # 允許此 job 在 P2.4 測試檔尚未建立前暫時失敗（continue-on-error 後續移除）
        continue-on-error: false
